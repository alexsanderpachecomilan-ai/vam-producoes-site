services:
  - type: web
    name: vam-producoes-site
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_WEB3FORMS_ACCESS_KEY
        sync: false
